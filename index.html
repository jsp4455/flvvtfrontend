<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FLVVT Gauntlet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="topUI">
    <input id="usernameInput" placeholder="Enter name..." maxlength="16">
    <button id="startBtn">Start</button>

    <div id="hud">
      <span>Phase: <b id="phase">1</b></span>
      <span>Score: <b id="score">0</b></span>
      <span>Status: <b id="status">IDLE</b></span>
    </div>
  </div>

  <canvas id="gameCanvas" width="800" height="450"></canvas>

  <!-- Leaderboard overlay -->
  <div id="overlay" class="hidden">
    <div class="overlay-inner">
      <h2>Run Over</h2>
      <p>Your score: <span id="finalScore">0</span> • Phase: <span id="finalPhase">1</span></p>

      <h3>Leaderboard</h3>
      <pre id="leaderboardList"></pre>

      <button id="closeOverlay">Close</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
