<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FLVVT Gauntlet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ui">
    <div class="row">
      <div>Player: <span id="playerName">Unknown</span></div>
      <div>Phase: <span id="phase">1</span></div>
      <div>Score: <span id="score">0</span></div>
      <div>Status: <span id="status">IDLE</span></div>
    </div>
    <div class="row">
      <button id="startBtn">Start Run</button>
      <button id="endBtn">End Run</button>
    </div>
    <div class="row small">
      <span>Move: WASD / Arrows • Start: Space • End: Esc</span>
    </div>
  </div>

  <canvas id="gameCanvas" width="800" height="450"></canvas>

  <script src="game.js"></script>
</body>
</html>
